set default=0
set timeout=8

# ── Graphics & font ───────────────────────────────────────────
if loadfont /boot/grub/unicode.pf2; then
    set gfxmode=auto
    set gfxpayload=keep
    insmod gfxterm
    insmod png
    terminal_output gfxterm
fi

# ── Background ────────────────────────────────────────────────
if background_image /boot/grub/nexos-grub.png; then
    set color_normal=light-cyan/black
    set color_highlight=black/cyan
    set menu_color_normal=light-gray/black
    set menu_color_highlight=black/cyan
else
    set color_normal=cyan/black
    set color_highlight=black/cyan
    set menu_color_normal=cyan/black
    set menu_color_highlight=black/cyan
fi

# ── Menu ──────────────────────────────────────────────────────

menuentry "  NEX OS  —  Boot Live" --class nexos --class gnu-linux --class os {
    linux  /casper/vmlinuz  boot=casper quiet splash ---
    initrd /casper/initrd
}

menuentry "  NEX OS  —  Boot Live (Safe Graphics)" --class nexos {
    linux  /casper/vmlinuz  boot=casper nomodeset quiet splash ---
    initrd /casper/initrd
}

menuentry "  NEX OS  —  Boot Live (Debug)" --class nexos {
    linux  /casper/vmlinuz  boot=casper ---
    initrd /casper/initrd
}

menuentry "  Check Disc for Defects" {
    linux  /casper/vmlinuz  boot=casper integrity-check quiet splash ---
    initrd /casper/initrd
}

if [ "${grub_platform}" = "efi" ]; then
    menuentry "  UEFI Firmware Settings" {
        fwsetup
    }
fi
