name: Build NexOS ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
                      /usr/lib/jvm /usr/share/swift
          sudo docker image prune --all --force 2>/dev/null || true
          sudo apt-get remove -yq '^llvm-.*' '^libllvm.*' 'php.*' \
                                  '^ruby.*' '^mono.*' '^dotnet.*' 2>/dev/null || true
          sudo apt-get autoremove -yq 2>/dev/null || true
          df -h

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed \
            mtools dosfstools xz-utils python3-pip
          pip3 install Pillow --quiet 2>/dev/null || true

      - name: Bootstrap Ubuntu noble
        run: |
          sudo mkdir -p /nexos/chroot /nexos/iso/casper /nexos/iso/boot/grub \
                        /nexos/iso/.disk /nexos/iso/EFI/boot
          sudo debootstrap \
            --arch=amd64 \
            --include=ca-certificates,curl,gnupg \
            noble /nexos/chroot http://archive.ubuntu.com/ubuntu/

      - name: Copy NexOS files into chroot
        run: |
          sudo mkdir -p /nexos/chroot/opt/nexos-setup /nexos/chroot/tmp/nexos-sddm
          sudo cp first-boot/wizard.py  /nexos/chroot/opt/nexos-setup/wizard.py
          sudo cp themes/sddm/Main.qml  /nexos/chroot/tmp/nexos-sddm/Main.qml
          sudo cp build/chroot-setup.sh /nexos/chroot/tmp/chroot-setup.sh
          sudo chmod +x /nexos/chroot/tmp/chroot-setup.sh

      - name: Mount virtual filesystems
        run: |
          for mp in dev dev/pts proc sys run; do
            sudo mkdir -p /nexos/chroot/$mp
            sudo mount --bind /$mp /nexos/chroot/$mp
          done
          sudo rm -f /nexos/chroot/etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee /nexos/chroot/etc/resolv.conf > /dev/null

      - name: Run chroot setup (installs KDE + gaming tools)
        run: sudo chroot /nexos/chroot bash /tmp/chroot-setup.sh

      - name: Generate wallpaper
        run: |
          sudo chroot /nexos/chroot python3 - << 'PYEOF'
          try:
              from PIL import Image, ImageDraw
          except ImportError:
              import subprocess; subprocess.run(["pip3","install","Pillow","-q"], check=False)
              from PIL import Image, ImageDraw
          import os
          os.makedirs("/usr/share/wallpapers/NexOS/contents/images", exist_ok=True)
          w, h = 1920, 1080
          img = Image.new("RGB", (w, h), "#08080f")
          d = ImageDraw.Draw(img)
          for x in range(0, w, 55): d.line([(x,0),(x,h)], fill="#0c0c1a", width=1)
          for y in range(0, h, 55): d.line([(0,y),(w,y)], fill="#0c0c1a", width=1)
          ov = Image.new("RGBA", (w, h), (0,0,0,0))
          d2 = ImageDraw.Draw(ov)
          d2.ellipse([-50,-50,750,750], fill=(0,245,255,9))
          d2.ellipse([1200,300,2050,1150], fill=(191,95,255,7))
          base = img.convert("RGBA")
          result = Image.alpha_composite(base, ov).convert("RGB")
          result.save("/usr/share/wallpapers/NexOS/contents/images/1920x1080.jpg","JPEG",quality=95)
          import json
          with open("/usr/share/wallpapers/NexOS/metadata.json","w") as f:
              json.dump({"KPlugin":{"Id":"NexOS","Name":"NexOS Default"}}, f)
          print("Wallpaper done")
          PYEOF

      - name: Unmount virtual filesystems
        if: always()
        run: |
          for mp in run sys proc dev/pts dev; do
            sudo umount -lf /nexos/chroot/$mp 2>/dev/null || true
          done

      - name: Build squashfs
        run: |
          sudo mksquashfs /nexos/chroot /nexos/iso/casper/filesystem.squashfs \
            -comp xz -Xbcj x86 -e boot -noappend 2>&1
          printf '%s' "$(sudo du -sx --block-size=1 /nexos/chroot | cut -f1)" \
            | sudo tee /nexos/iso/casper/filesystem.size

      - name: Copy kernel and initrd
        run: |
          sudo cp $(ls /nexos/chroot/boot/vmlinuz-* | sort -V | tail -1) /nexos/iso/casper/vmlinuz
          sudo cp $(ls /nexos/chroot/boot/initrd.img-* | sort -V | tail -1) /nexos/iso/casper/initrd

      - name: Set up GRUB bootloader
        run: |
          sudo cp build/grub.cfg /nexos/iso/boot/grub/grub.cfg
          # Copy unicode font if available
          sudo cp /usr/share/grub/unicode.pf2 /nexos/iso/boot/grub/ 2>/dev/null || true

          # BIOS boot image
          sudo grub-mkstandalone \
            --format=i386-pc \
            --output=/nexos/bios.img \
            --install-modules="linux16 linux normal iso9660 biosdisk memdisk search tar ls" \
            --modules="linux16 linux normal iso9660 biosdisk search" \
            --locales="" --fonts="" \
            "boot/grub/grub.cfg=/nexos/iso/boot/grub/grub.cfg"
          sudo bash -c "cat /usr/lib/grub/i386-pc/cdboot.img /nexos/bios.img > /nexos/iso/boot/grub/bios.img"

          # EFI boot image
          sudo grub-mkstandalone \
            --format=x86_64-efi \
            --output=/nexos/bootx64.efi \
            --install-modules="linux normal iso9660 gfxmenu gfxterm search" \
            --locales="" --fonts="" \
            "boot/grub/grub.cfg=/nexos/iso/boot/grub/grub.cfg"
          sudo dd if=/dev/zero of=/nexos/iso/EFI/efiboot.img bs=1M count=4
          sudo mkfs.vfat /nexos/iso/EFI/efiboot.img
          sudo mmd -i /nexos/iso/EFI/efiboot.img ::/EFI ::/EFI/BOOT
          sudo mcopy -i /nexos/iso/EFI/efiboot.img /nexos/bootx64.efi ::/EFI/BOOT/BOOTx64.EFI

      - name: Write disk info
        run: |
          echo "NexOS 1.0 - Release amd64 ($(date +%Y%m%d))" | sudo tee /nexos/iso/.disk/info
          (cd /nexos/iso && sudo find . -type f -not -name md5sum.txt -exec md5sum {} \; | sudo tee md5sum.txt)

      - name: Build final ISO
        run: |
          sudo xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "NEXOS_1_0" \
            -appid "NexOS 1.0" \
            --grub2-mbr /usr/lib/grub/i386-pc/boot_hybrid.img \
            --protective-msdos-label \
            -partition_offset 16 \
            -eltorito-boot boot/grub/bios.img \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            --grub2-boot-info \
            -eltorito-alt-boot \
            -e EFI/efiboot.img \
            -no-emul-boot \
            -append_partition 2 0xef /nexos/iso/EFI/efiboot.img \
            -output $GITHUB_WORKSPACE/nexos.iso \
            /nexos/iso
          ls -lh $GITHUB_WORKSPACE/nexos.iso

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0-$(date +%Y%m%d-%H%M)"
          gh release create "$TAG" $GITHUB_WORKSPACE/nexos.iso \
            --title "NexOS $TAG" \
            --notes "## NexOS Gaming Linux ISO
          Download nexos.iso, create a VirtualBox VM (Linux 64-bit, 4GB RAM, 50GB disk, 128MB video), mount the ISO, boot, login as nexos/nexos — setup wizard opens automatically."
