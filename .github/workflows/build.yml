name: Build NexOS ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
                      /usr/lib/jvm /usr/share/swift
          sudo docker image prune --all --force 2>/dev/null || true
          sudo apt-get remove -yq '^llvm-.*' '^libllvm.*' 'php.*' \
                                  '^ruby.*' '^mono.*' '^dotnet.*' 2>/dev/null || true
          sudo apt-get autoremove -yq 2>/dev/null || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed \
            mtools dosfstools xz-utils python3-pip
          sudo pip3 install Pillow --quiet

      - name: Build NexOS ISO
        run: |
          export CI=true
          export WORK=/tmp/nexos-build
          export OUT=$GITHUB_WORKSPACE
          sudo -E bash build/build.sh

      - name: Show ISO info
        run: ls -lh nexos.iso && md5sum nexos.iso

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0-$(date +%Y%m%d-%H%M)"
          gh release create "$TAG" nexos.iso \
            --title "NexOS $TAG" \
            --notes "## NexOS Gaming Linux ISO
          Download nexos.iso, mount in VirtualBox (Linux 64-bit, 4GB RAM, 50GB disk), boot, login nexos/nexos."
